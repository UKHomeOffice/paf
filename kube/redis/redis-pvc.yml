---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
spec:
  accessModes:
    - {{ .REDIS_PERSISTENCE_ACCESS_MODES }}
  resources:
    requests:
      storage: {{ .REDIS_PERSISTENCE_SIZE }}
  {{ if .REDIS_PERSISTENCE_STORAGE_CLASS }}
  storageClassName: {{ .REDIS_PERSISTENCE_STORAGE_CLASS }}
  {{ end }}
